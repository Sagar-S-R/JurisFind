<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded background matching gray-900 nav icon -->
  <rect width="32" height="32" rx="7" fill="#111827"/>
  <!-- Scale / balance icon (lucide-style, white) -->
  <!-- Center vertical pole -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Horizontal beam -->
  <line x1="8" y1="11" x2="24" y2="11" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Left arm chain -->
  <line x1="10" y1="11" x2="10" y2="18" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right arm chain -->
  <line x1="22" y1="11" x2="22" y2="18" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Left pan (arc) -->
  <path d="M7 18 Q10 22.5 13 18" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right pan (arc) -->
  <path d="M19 18 Q22 22.5 25 18" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base foot -->
  <line x1="13" y1="25" x2="19" y2="25" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
</svg>